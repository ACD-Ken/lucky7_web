    <title>Lucky7 TOTO AI</title>
    <script>
      (function(l){if(l.search[1]==='/'){var d=l.search.slice(1).split('&').map(
        function(s){return s.replace(/~and~/g,'&')}).join('?');
        window.history.replaceState(null,null,l.pathname.slice(0,-1)+d+l.hash);
      }}(window.location));
    </script>
